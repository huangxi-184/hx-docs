name: huangxi-docs

on:
  push:
    branches:
      - master
  workflow_dispatch:
    # 允许手动触发

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs
        env:
          NODE_OPTIONS: --max_old_space_size=8192
        run: pnpm run build

      - name: Deploy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.USER_HOST }}
          username: ${{ secrets.USER_NAME }}
          password: ${{ secrets.USER_PASS }}
          port: 22
          timeout: 120s
          rm: true # ✅ 部署前先清空远程目录，避免残留旧文件
          strip_components: 3 # 去掉 src/.vuepress/dist 这三层路径
          source: "src/.vuepress/dist/**"
          target: "/var/www/html"
